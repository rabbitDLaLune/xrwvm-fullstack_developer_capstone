
name: Lint Code

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint_python:
    name: Lint Python Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run Python Linter
        run: |
          find ./server \
            -name "*.py" \
            -not -path "*/djangoenv/*" \
            -not -path "*/node_modules/*" \
            -not -path "*/__pycache__/*" \
            -print0 |
          xargs -0 flake8 \
            --ignore=E101,E116,E203,E231,E302,E501,E712,E722,F401,F811,F841,W191,W292,W391

          echo "Linted all Python files successfully"

  lint_js:
    name: Lint JavaScript Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install JSHint
        run: npm install --global jshint

      - name: Run JavaScript Linter
        run: |
          find ./server/database \
            -name "*.js" \
            -not -path "*/node_modules/*" \
            -print0 |
          xargs -0 jshint

          echo "Linted all JavaScript files successfully"

